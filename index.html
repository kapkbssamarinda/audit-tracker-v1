<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d6efd">
  <title>Audit Progress Tracker — KAP KBS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- ===== Halaman Login ===== -->
  <div id="view-login" class="d-none">
    <div class="login-wrap d-flex align-items-center justify-content-center min-vh-100">
      <div class="card shadow-sm login-card">
        <div class="card-body text-center p-4 p-sm-5">
          <i class="bi bi-clipboard2-check display-4 text-primary"></i>
          <h4 class="mt-3 mb-1">Audit Progress Tracker</h4>
          <p class="text-muted mb-4">KAP Kuncara Budi Santosa &amp; Rekan</p>
          <div id="gsi-button" class="d-flex justify-content-center"></div>
          <div id="login-status" class="small text-muted mt-3"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Aplikasi ===== -->
  <div id="view-app" class="d-none">
    <nav class="navbar navbar-dark bg-primary sticky-top">
      <div class="container-fluid">
        <span class="navbar-brand">
          <i class="bi bi-clipboard2-check me-1"></i> Audit Tracker KBS
        </span>
        <div class="d-flex align-items-center gap-3">
          <span class="text-white small">
            <span id="nav-nama"></span>
            <span id="nav-role" class="badge bg-light text-primary ms-1"></span>
          </span>
          <button id="btn-logout" class="btn btn-sm btn-outline-light">
            <i class="bi bi-box-arrow-right"></i> Keluar
          </button>
        </div>
      </div>
    </nav>

    <div class="container-fluid py-3 px-3 px-md-4">
      <ul class="nav nav-pills mb-3" id="main-tabs"></ul>
      <div id="main-content"></div>
    </div>
  </div>

  <!-- ===== Modal: Catatan Reject ===== -->
  <div class="modal fade" id="modal-reject" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Tolak Pekerjaan</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="small text-muted mb-2" id="reject-task-name"></p>
          <label class="form-label">Catatan / alasan penolakan <span class="text-danger">*</span></label>
          <textarea id="reject-catatan" class="form-control" rows="3" required></textarea>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
          <button id="reject-submit" class="btn btn-danger">Tolak</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Modal: Assign / Due Date (Manager) ===== -->
  <div class="modal fade" id="modal-assign" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Penugasan Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="small text-muted mb-2" id="assign-task-name"></p>
          <div class="mb-3">
            <label class="form-label">Ditugaskan ke</label>
            <select id="assign-email" class="form-select"></select>
          </div>
          <div class="mb-1">
            <label class="form-label">Due date</label>
            <input type="date" id="assign-due" class="form-control">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
          <button id="assign-submit" class="btn btn-primary">Simpan</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Modal: Form User (Admin) ===== -->
  <div class="modal fade" id="modal-user" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="user-modal-title">User</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="user-email" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Nama</label>
            <input type="text" id="user-nama" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Role</label>
            <select id="user-role" class="form-select">
              <option>Admin</option><option>Partner</option><option>Manager</option>
              <option>Ketua</option><option>Anggota</option>
            </select>
          </div>
          <div class="mb-1">
            <label class="form-label">Status</label>
            <select id="user-status" class="form-select">
              <option>Aktif</option><option>Nonaktif</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
          <button id="user-submit" class="btn btn-primary">Simpan</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Modal: Form Klien (Admin) ===== -->
  <div class="modal fade" id="modal-client" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable modal-fullscreen-sm-down">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="client-modal-title">Klien</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="client-id">
          <div class="mb-3">
            <label class="form-label">Nama Perusahaan</label>
            <input type="text" id="client-nama" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Tahun Buku</label>
            <input type="text" id="client-tahun" class="form-control" placeholder="mis. 2025">
          </div>
          <div class="mb-3">
            <label class="form-label">Email Manager</label>
            <input type="email" id="client-manager" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Email Ketua</label>
            <input type="email" id="client-ketua" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Email Anggota <small class="text-muted">(pisahkan dengan koma)</small></label>
            <input type="text" id="client-anggota" class="form-control" placeholder="a@gmail.com, b@gmail.com">
          </div>
          <div class="mb-1">
            <label class="form-label">Status Klien</label>
            <select id="client-status" class="form-select">
              <option>Aktif</option><option>Selesai</option><option>Nonaktif</option>
            </select>
          </div>
          <div id="client-new-hint" class="alert alert-info small mt-3 mb-0 d-none">
            Menyimpan klien baru akan otomatis men-generate 17 task standar
            (Planning, Execution, Reporting).
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
          <button id="client-submit" class="btn btn-primary">Simpan</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
  <script src="app.js"></script>
</body>
</html>
